# Andijon Polka — nginx server block
# Joylash:  /etc/nginx/sites-available/andijonpolka.conf
# Yoqish:   sudo ln -s /etc/nginx/sites-available/andijonpolka.conf /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# server_name va dist yo'llarini o'zingizникiga moslang.

server {
    listen 80;
    listen [::]:80;

    server_name polka.example.uz;          # <<< O'Z DOMENINGIZ yoki server IP

    client_max_body_size 12M;              # fotosuratlar uchun

    # --- Backend API + fotosuratlar (/api/cdn) -> Node (5000) ---
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # --- Admin panel: /admin/ ---
    location /admin/ {
        alias /home/markaz/AndijonPolka/admin-cert-frontend/dist/;
        try_files $uri $uri/ /admin/index.html;
    }
    location = /admin {
        return 301 /admin/;
    }

    # --- Ishtirokchi sayti (asosiy) ---
    location / {
        root /home/markaz/AndijonPolka/certificate_site/dist;
        try_files $uri $uri/ /index.html;
    }
}
