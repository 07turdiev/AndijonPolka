# Andijon Polka — nginx server block
# Joylash:  /etc/nginx/sites-available/andijonpolka.uz
# Yoqish:   sudo ln -s /etc/nginx/sites-available/andijonpolka.uz /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# DIQQAT: SSL (HTTPS) load balancer'da tugaydi, bu nginx 80-portда HTTP qabul qiladi.
# Shuning uchun X-Forwarded-Proto qattiq "https" qilib qo'yilgan (mavjud saytlardagidek).
# dist yo'llarini o'zingizникiga moslang.

server {
    listen 80;
    server_name andijonpolka.uz www.andijonpolka.uz;

    client_max_body_size 12M;              # fotosuratlar uchun

    # --- Backend API + fotosuratlar (/api/cdn) -> Node (5000) ---
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;   # LB SSL ni tugatadi
        proxy_read_timeout 90s;
    }

    # --- Admin panel: /admin/ (statik Vue build) ---
    location /admin/ {
        alias /home/markaz/AndijonPolka/admin-cert-frontend/dist/;
        try_files $uri $uri/ /admin/index.html;
    }
    location = /admin {
        return 301 /admin/;
    }

    # --- Ishtirokchi sayti (asosiy, statik Vue build) ---
    location / {
        root /home/markaz/AndijonPolka/certificate_site/dist;
        try_files $uri $uri/ /index.html;
    }
}
